openapi: 3.0.3
info:
  title: MusicAlligator API
  version: 0.1.0
  description: Спецификация MusicAlligator API.
servers:
- url: https://v2api.musicalligator.ru/api
  description: Production
security:
- tokenAuth: []
tags:
- name: Auth
  description: Аутентификация
- name: Releases
  description: Релизы и треки
- name: Platforms
  description: Площадки и страны
- name: Artists
  description: Артисты
- name: Persons
  description: Участники (авторы, продюсеры и т.п.)
- name: Labels
  description: Лейблы
- name: Statistics
  description: Статистика прослушиваний
- name: Finance
  description: Финансы и выплаты
- name: Client
  description: Клиент, профиль и документы
- name: Support
  description: Поддержка
- name: System
  description: Системные эндпоинты
paths:
  /auth/sign_in:
    post:
      tags:
      - Auth
      summary: Вход
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthSignInRequest'
      responses:
        '201':
          description: Вход выполнен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSignInResponse'
        '400':
          description: Ошибка входа.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/authenticate:
    get:
      tags:
      - Auth
      summary: Проверить токен
      responses:
        '200':
          description: Сессия активна.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthAuthenticateResponse'
  /releases:
    post:
      tags:
      - Releases
      summary: Список релизов
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                search:
                  type: string
                status:
                  type: string
                  enum:
                  - DRAFT
                  - ERROR
                  - MODERATE
                  - WAITING
                  - RELEASED
                  - TASK
                  - WORKING
                  - UPLOADED
                  - REMOVED
                  - EDIT
                  - PARTIAL_UPLOAD
                limit:
                  type: integer
                skip:
                  type: integer
                startDate:
                  type: string
                  format: date
                  nullable: true
                endDate:
                  type: string
                  format: date
                  nullable: true
                startDateRelease:
                  type: string
                  format: date
                  nullable: true
                endDateRelease:
                  type: string
                  format: date
                  nullable: true
              example:
                search: ''
                limit: 10
                skip: 0
                startDate: null
                endDate: null
                startDateRelease: null
                endDateRelease: null
      responses:
        '201':
          description: Релизы.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleasesListResponse'
        '400':
          description: Ошибка запроса.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /releases/create:
    post:
      tags:
      - Releases
      summary: Создать релиз
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReleaseRequest'
      responses:
        '201':
          description: Релиз создан.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReleaseResponse'
  /releases/filters:
    get:
      tags:
      - Releases
      summary: Справочник фильтров релизов (жанры, типы, языки)
      parameters:
      - $ref: '#/components/parameters/XLang'
      responses:
        '200':
          description: Справочник.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleasesFiltersResponse'
        '400':
          description: Ошибка запроса.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /releases/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID релиза (возвращается в POST /releases/create).
    get:
      tags:
      - Releases
      summary: Получить релиз по ID
      description: Возвращает релиз целиком, вместе с массивом треков.
      responses:
        '200':
          description: Объект релиза.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseResponse'
        '404':
          description: Релиз не найден.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - Releases
      summary: Обновить релиз (вместе со всеми треками)
      description: Полное обновление релиза. Тело содержит весь релиз целиком, включая массив tracks[]
        с полными объектами треков.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseUpdate'
      responses:
        '200':
          description: Релиз обновлён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Ошибка валидации.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Releases
      summary: Удалить релиз
      responses:
        '200':
          description: Релиз удалён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /releases/{id}/status/moderate:
    put:
      tags:
      - Releases
      summary: Отправить релиз на модерацию
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID релиза.
      responses:
        '200':
          description: Релиз отправлен на модерацию.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Ошибка валидации релиза.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ddex/release/{id}:
    get:
      tags:
      - Releases
      summary: Статусы выгрузки релиза по площадкам
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID релиза.
      responses:
        '200':
          description: Статусы выгрузки.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseUploadStatusesResponse'
  /releases/{id}/cover:
    post:
      tags:
      - Releases
      summary: Загрузить обложку релиза
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID релиза.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Файл обложки.
      responses:
        '201':
          description: Обложка загружена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
  /releases/{id}/tracks/order:
    post:
      tags:
      - Releases
      summary: Изменить порядок треков
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID релиза.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order:
                  type: array
                  items:
                    $ref: '#/components/schemas/TrackOrderItem'
              required:
              - order
              description: Порядок треков.
      responses:
        '201':
          description: Порядок сохранён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /releases/{id}/tracks:
    post:
      tags:
      - Releases
      summary: Создать трек в релизе
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID релиза.
      responses:
        '201':
          description: Трек создан.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTrackResponse'
  /releases/{id}/tracks/{trackId}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID релиза.
    - name: trackId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID трека.
    put:
      tags:
      - Releases
      summary: Создать/обновить трек
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Track'
      responses:
        '200':
          description: Трек сохранён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Ошибка валидации.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Releases
      summary: Удалить трек
      responses:
        '200':
          description: Трек удалён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /releases/{id}/tracks/{trackId}/upload:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID релиза.
    - name: trackId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID трека.
    post:
      tags:
      - Releases
      summary: Загрузить аудиофайл трека
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Аудио/видео файл трека.
      responses:
        '201':
          description: Файл загружен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
    delete:
      tags:
      - Releases
      summary: Удалить аудиофайл трека
      responses:
        '200':
          description: Файл удалён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /platform/platforms/streaming:
    get:
      tags:
      - Platforms
      summary: Список стриминговых площадок
      parameters:
      - $ref: '#/components/parameters/XLang'
      - name: withProviders
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Площадки.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamingPlatformsResponse'
        '400':
          description: Ошибка запроса.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /platform/platforms/social:
    get:
      tags:
      - Platforms
      summary: Список соцсетей
      responses:
        '200':
          description: Соцсети.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialPlatformsResponse'
  /platform/countries:
    get:
      tags:
      - Platforms
      summary: Список стран
      responses:
        '200':
          description: Страны.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountriesResponse'
        '400':
          description: Ошибка запроса.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /artists:
    get:
      tags:
      - Artists
      summary: Поиск артистов
      parameters:
      - name: name
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      - name: skip
        in: query
        required: false
        schema:
          type: integer
      - name: ids[]
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
      responses:
        '200':
          description: Артисты.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchEntitiesResponse'
    post:
      tags:
      - Artists
      summary: Создать артиста
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistCreate'
      responses:
        '201':
          description: Артист создан.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
  /artists/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID артиста.
    put:
      tags:
      - Artists
      summary: Обновить артиста
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtistCreate'
      responses:
        '200':
          description: Артист обновлён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
    delete:
      tags:
      - Artists
      summary: Удалить артиста
      responses:
        '200':
          description: Артист удалён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /persons:
    get:
      tags:
      - Persons
      summary: Поиск участников
      parameters:
      - name: name
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      - name: skip
        in: query
        required: false
        schema:
          type: integer
      - name: ids
        in: query
        required: false
        schema:
          type: string
        description: Список ID через запятую.
      responses:
        '200':
          description: Участники.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchEntitiesResponse'
    post:
      tags:
      - Persons
      summary: Создать участника
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonCreate'
      responses:
        '201':
          description: Участник создан.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
  /persons/person-data:
    get:
      tags:
      - Persons
      summary: Справочник ролей и инструментов
      description: Источник правды по ролям (roleKeys) и инструментам (instrumentKeys) для треков.
      responses:
        '200':
          description: Справочник.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonDataResponse'
  /persons/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID участника.
    put:
      tags:
      - Persons
      summary: Обновить участника
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonCreate'
      responses:
        '200':
          description: Участник обновлён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
    delete:
      tags:
      - Persons
      summary: Удалить участника
      responses:
        '200':
          description: Участник удалён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /labels:
    get:
      tags:
      - Labels
      summary: Поиск лейблов
      parameters:
      - name: name
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      - name: skip
        in: query
        required: false
        schema:
          type: integer
      - name: ids
        in: query
        required: false
        schema:
          type: string
        description: Список ID через запятую.
      responses:
        '200':
          description: Лейблы (ответ с двойной вложенностью data.data).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelsSearchResponse'
    post:
      tags:
      - Labels
      summary: Создать лейбл
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
              - name
      responses:
        '201':
          description: Лейбл создан.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelCreateResponse'
  /labels/{id}:
    put:
      tags:
      - Labels
      summary: Обновить лейбл
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID лейбла.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
              - name
      responses:
        '200':
          description: Лейбл обновлён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /statistics:
    post:
      tags:
      - Statistics
      summary: Запрос статистики
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatisticsRequest'
      responses:
        '201':
          description: Статистика.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatisticsResponse'
  /statistics/filters:
    get:
      tags:
      - Statistics
      summary: Доступные фильтры статистики
      responses:
        '200':
          description: Фильтры статистики.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatisticsFiltersResponse'
  /finance/reports:
    post:
      tags:
      - Finance
      summary: Финансовые отчёты
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinanceReportsRequest'
      responses:
        '201':
          description: Финансовые отчёты.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceReportsResponse'
  /finance/reports/detailed:
    post:
      tags:
      - Finance
      summary: Детальный отчёт
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinanceDetailedReportsRequest'
      responses:
        '201':
          description: Детальный отчёт.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceDetailedReportsResponse'
  /finance/reports/file/{type}:
    get:
      tags:
      - Finance
      summary: Файл отчёта
      parameters:
      - name: type
        in: path
        required: true
        schema:
          type: string
          enum:
          - csv
          - pdf
          - xlsx
      - name: periodIds[]
        in: query
        required: true
        schema:
          type: array
          items:
            type: integer
        style: form
        explode: true
      - name: releaseId
        in: query
        required: false
        schema:
          type: integer
      - name: artistIds[]
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        style: form
        explode: true
      - name: platformIds[]
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        style: form
        explode: true
      responses:
        '200':
          description: Файл отчёта.
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '400':
          description: Ошибка запроса.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /finance/reports/filters:
    get:
      tags:
      - Finance
      summary: Фильтры отчётов
      responses:
        '200':
          description: Фильтры отчётов.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceReportsFiltersResponse'
    post:
      tags:
      - Finance
      summary: Фильтры отчётов с локализованными справочниками
      parameters:
      - $ref: '#/components/parameters/XLang'
      responses:
        '201':
          description: Фильтры отчётов.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceReportsFilterOptionsResponse'
  /finance/transactions:
    post:
      tags:
      - Finance
      summary: Список транзакций
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinanceTransactionsRequest'
      responses:
        '201':
          description: Список транзакций.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceTransactionsResponse'
  /finance/transactions/invoice/{currency}/history:
    get:
      tags:
      - Finance
      summary: История инвойсов
      parameters:
      - name: currency
        in: path
        required: true
        schema:
          type: string
          enum:
          - RUB
          - EUR
      responses:
        '200':
          description: История инвойсов.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceInvoiceHistoryResponse'
  /finance/balance:
    get:
      tags:
      - Finance
      summary: Баланс
      responses:
        '200':
          description: Баланс.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceBalanceResponse'
  /documents/contracts:
    get:
      tags:
      - Client
      summary: Список договоров
      responses:
        '200':
          description: Данные договора.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractDocumentResponse'
  /documents/contracts/html:
    get:
      tags:
      - Client
      summary: HTML договора
      responses:
        '200':
          description: HTML-разметка договора.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractHtmlResponse'
  /documents/contracts/template:
    get:
      tags:
      - Client
