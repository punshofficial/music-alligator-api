components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: authorization
      description: Токен сессии (UUID), передаётся в заголовке authorization.
  schemas:
    Genre:
      type: object
      properties:
        genreId:
          type: integer
          example: 92
      required:
      - genreId
    NamedRef:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      description: Краткая ссылка на сущность (подтверждены id и name).
    ArtistRef:
      type: object
      properties:
        id:
          type: integer
          example: 88029
        role:
          type: string
          enum:
          - MAIN
          - FEAT
          example: MAIN
      required:
      - id
      - role
    PlatformBinding:
      type: object
      properties:
        streamingPlatformId:
          type: integer
          description: ID площадки из /platform/platforms/streaming.
          example: 291
        platformId:
          type: string
          description: Внешний ID профиля на площадке (может быть пустым).
          example: spotify:artist:5Ii3BSYi2AVLX8mDiyd4CQ
      description: Привязка площадки внутри трека (персоны/артиста).
    TrackPerson:
      type: object
      properties:
        id:
          type: integer
          description: ID персоны (/persons).
          example: 81424
        roleKeys:
          type: array
          items:
            type: string
          description: Ключи ролей из /persons/person-data.
          example:
          - COMPOSER
          - LYRICIST
          - PRODUCER
        instrumentKeys:
          type: array
          items:
            type: string
          description: Ключи инструментов из /persons/person-data.
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/PlatformBinding'
      required:
      - id
      - roleKeys
      description: Участник трека. Источник правды по ролям и инструментам.
    Contributor:
      type: object
      properties:
        personId:
          type: integer
          example: 81424
        roleIds:
          type: array
          items:
            type: integer
          description: Числовые ID ролей. Может приходить пустым — роли берутся из persons[].
        instrumentIds:
          type: array
          items:
            type: integer
      required:
      - personId
      description: Legacy-модель того же участника; отправляется для совместимости.
    ClientRef:
      type: object
      properties:
        id:
          type: integer
          example: 58474
      required:
      - id
      description: Клиент (владелец релиза). В ответе приходит также профиль; здесь оставлен только id.
    Media:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
        url:
          type: string
          format: uri
        type:
          type: string
          enum:
          - cover
          - cover_750
          - wav
          - mp3
      description: Медиафайл релиза/трека.
    Checklist:
      type: object
      properties:
        status:
          type: string
          example: NEW
        data:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              newValue: {}
              oldValue: {}
              isAccepted:
                type: boolean
              dtUpdated:
                type: string
                nullable: true
      description: Лог изменений полей (используется при модерации).
    Track:
      type: object
      properties:
        trackId:
          type: integer
          format: int64
          example: 908312
        title:
          type: string
          example: Pentagramma
        trackVersion:
          type: string
          nullable: true
          description: Версия (например, "Slowed"); null для основной.
        genre:
          $ref: '#/components/schemas/Genre'
        additionalGenres:
          type: array
          items:
            oneOf:
            - type: integer
            - $ref: '#/components/schemas/Genre'
          description: Внутри release-payload приходит как [id], в отдельном PUT трека — как [{ genreId
            }].
        language:
          type: integer
          description: ID языка (например, 7 = русский).
          example: 7
        ownIsrc:
          type: string
          nullable: true
        related:
          type: integer
          description: Доля связанных прав (0–100).
          example: 100
        copyrights:
          type: integer
          description: Доля авторских прав (0–100).
          example: 100
        adult:
          type: boolean
          example: false
        instrumental:
          type: boolean
          description: Если true — LYRICIST не обязателен.
          example: false
        karaoke:
          type: string
          nullable: true
        recordingYear:
          type: integer
          example: 2026
        startPoint:
          type: integer
          description: Точка старта превью (сек).
          example: 0
        clipPreviewFrame:
          type: integer
          nullable: true
          description: Только для CLIP.
        artists:
          type: array
          items:
            $ref: '#/components/schemas/ArtistRef'
        persons:
          type: array
          items:
            $ref: '#/components/schemas/TrackPerson'
        contributors:
          type: array
          items:
            $ref: '#/components/schemas/Contributor'
      required:
      - trackId
      - title
      - genre
      - language
      - recordingYear
      - persons
      description: Объект трека (тело PUT /releases/{id}/tracks/{trackId} и элемент tracks[]).
    ReleaseUpdate:
      type: object
      properties:
        releaseId:
          type: integer
          format: int64
          example: 362233
        title:
          type: string
          example: Pentagramma
        releaseType:
          type: string
          enum:
          - SINGLE
          - ALBUM
          - EP
          - PODCAST
          - CLIP
          - RINGTONE
          - TIKTOK_SOUND
          example: ALBUM
        status:
          type: string
          enum:
          - DRAFT
          - ALL
          - ERROR
          - MODERATE
          - WAITING
          - SHIPPING
          - RELEASED
          - TASK
          - WORKING
          - UPLOADED
          - REMOVED
          - DELETED
          - EDIT
          - PARTIAL_UPLOAD
          description: При создании/обновлении используется DRAFT; прочие значения выставляются системой.
          example: DRAFT
        releaseDate:
          type: string
          format: date
          description: Дата релиза (на запись — date).
          example: '2026-08-07'
        originalReleaseDate:
          type: string
          format: date
          nullable: true
        presaveDate:
          type: string
          format: date
          nullable: true
        createDate:
          type: string
          format: date-time
          nullable: true
        language:
          type: integer
          nullable: true
          description: ID языка релиза (часто null; язык задаётся на треке).
        genre:
          $ref: '#/components/schemas/Genre'
        additionalGenres:
          type: array
          items:
            $ref: '#/components/schemas/Genre'
        label:
          type: string
          example: AURA MUSIC
        labelId:
          type: integer
          example: 41510
        articleLabel:
          type: string
          example: MUA362233
        internalId:
          type: string
          example: alligator-r2362233
        releaseVersion:
          type: string
          nullable: true
        ownEan:
          type: string
          nullable: true
        clineValue:
          type: string
          description: Правообладатель (C-line).
          example: AURAMUSIC
        clineYear:
          type: string
          example: '2026'
        plineValue:
          type: string
          description: Правообладатель фонограммы (P-line).
          example: AURAMUSIC
        plineYear:
          type: string
          example: '2026'
        cover:
          type: string
          description: Путь к обложке в хранилище.
        client:
          $ref: '#/components/schemas/ClientRef'
        artist:
          type: integer
          description: ID основного артиста (дублирует MAIN из artists[]).
          example: 88029
        artists:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ArtistRef'
        persons:
          type: array
          items: {}
          description: На уровне релиза всегда пусто. Участники задаются на треках.
        streamingPlatforms:
          type: array
          items:
            type: integer
          description: ID площадок из /platform/platforms/streaming.
        countries:
          type: array
          items:
            type: integer
        level:
          type: string
          enum:
          - REGULAR
          - PREMIUM
          example: PREMIUM
        levelPlan:
          type: string
          enum:
          - BUSINESS
          - STANDARD
          - PREMIUM
          - BUSINESS-START
          - BUSINESS-STANDARD
          - BUSINESS-PREMIUM
          example: BUSINESS-PREMIUM
        isReleased:
          type: boolean
          example: false
        contractSigned:
          type: boolean
          example: false
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/Track'
          description: Полные объекты треков (не ссылки).
      required:
      - releaseId
      - title
      - releaseType
      - releaseDate
      - genre
      - artists
      description: Тело PUT /releases/{id}. Frontend-внутренние поля (_*) опущены.
    TrackResponse:
      description: 'Объект трека в ответе: Track плюс серверные поля.'
      allOf:
      - $ref: '#/components/schemas/Track'
      - type: object
        properties:
          media:
            type: array
            items:
              $ref: '#/components/schemas/Media'
          trackData:
            type: object
            properties:
              duration:
                type: number
                description: Длительность, сек.
                example: 125.75
          processStatus:
            type: string
            example: completed
          processMessage:
            type: string
          internalId:
            type: string
          md5:
            type: string
          track:
            type: string
            description: Путь к исходному (wav) файлу.
          dtCreate:
            type: string
          checklist:
            $ref: '#/components/schemas/Checklist'
    Release:
      description: 'Объект релиза в ответе: ReleaseUpdate плюс серверные поля. releaseDate в ответе приходит
        как date-time.'
      allOf:
      - $ref: '#/components/schemas/ReleaseUpdate'
      - type: object
        properties:
          releaseDate:
            type: string
            format: date-time
            example: '2026-08-07T00:00:00Z'
          media:
            type: array
            items:
              $ref: '#/components/schemas/Media'
          isFromMigration:
            type: boolean
            nullable: true
          checklist:
            $ref: '#/components/schemas/Checklist'
          tracks:
            type: array
            items:
              $ref: '#/components/schemas/TrackResponse'
    ReleaseResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Release'
        statusCode:
          type: integer
          example: 200
    CreateReleaseRequest:
      type: object
      properties:
        releaseType:
          type: string
          enum:
          - SINGLE
          - ALBUM
          - EP
          - PODCAST
          - CLIP
          - RINGTONE
          - TIKTOK_SOUND
          example: SINGLE
      required:
      - releaseType
      description: Тело POST /releases/create.
    CreateReleaseResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            release:
              type: object
              properties:
                releaseId:
                  type: integer
                  example: 362233
                tracks:
                  type: array
                  items:
                    type: object
                    properties:
                      trackId:
                        type: integer
        statusCode:
          type: integer
      description: Подтверждены releaseId и первый trackId.
    PersonPlatform:
      type: object
      properties:
        id:
          type: integer
          description: ID площадки из /platform/platforms/streaming.
          example: 291
        name:
          type: string
          example: Spotify
        platformId:
          type: string
          description: Внешний ID профиля (может быть пустым).
      description: Привязка площадки при создании/редактировании персоны.
    PersonCreate:
      type: object
      properties:
        name:
          type: string
          example: Тестик
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/PersonPlatform'
      required:
      - name
      description: Тело POST /persons.
    IdResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: integer
              example: 133586
        statusCode:
          type: integer
          example: 201
      description: Возвращается только id созданной сущности.
    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameEn:
          type: string
        key:
          type: string
          description: Ключ для roleKeys в треке.
        category:
          type: string
        categoryEn:
          type: string
    Instrument:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameEn:
          type: string
        key:
          type: string
          description: Ключ для instrumentKeys в треке.
        category:
          type: string
        categoryEn:
          type: string
    PersonDataResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            roles:
              type: array
              items:
                $ref: '#/components/schemas/Role'
            instruments:
              type: array
              items:
                $ref: '#/components/schemas/Instrument'
        statusCode:
          type: integer
      description: Справочник ролей и инструментов.
    StreamingPlatform:
      type: object
      properties:
        id:
          type: integer
          example: 291
        name:
          type: string
        publicName:
          type: string
        urlIcon:
          type: string
        releaseTypes:
          type: array
          items:
            $ref: '#/components/schemas/ReleaseTypeRef'
        domains:
          type: array
          items:
            type: string
    ReleaseTypeRef:
      type: object
      properties:
        releaseTypeId:
          type: integer
        releaseType:
          type: string
          enum:
          - SINGLE
          - ALBUM
          - EP
          - PODCAST
          - CLIP
          - RINGTONE
          - TIKTOK_SOUND
    StreamingPlatformsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StreamingPlatform'
        statusCode:
          type: integer
          example: 200
    SocialPlatform:
      type: object
      properties:
        id:
          type: integer
          example: 5
        name:
          type: string
        icon_url:
          type: string
        domains:
          type: array
          items:
            type: string
    SocialPlatformsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SocialPlatform'
        statusCode:
          type: integer
          example: 200
    Country:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
          description: ISO alpha-2.
          example: AB
        name:
          type: string
        alpha3:
          type: string
        nameEn:
          type: string
        isAvailableForDistribution:
          type: boolean
        countryGroup:
          type: string
        countryGroupEn:
          type: string
    CountriesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Country'
        statusCode:
          type: integer
          example: 200
    FilterGenre:
