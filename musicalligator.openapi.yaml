        streamingPlatformId:
          type: integer
          description: ID площадки.
        status:
          type: string
          enum:
          - UPLOADED
          - WAITING_FOR_DELIVERY
          - ERROR
          description: Статус выгрузки. Значение updated отображается как uploaded.
        userError:
          type: string
          nullable: true
      description: Элемент статуса выгрузки релиза.
    ReleaseUploadStatusesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ReleaseUploadStatusItem'
        statusCode:
          type: integer
          example: 200
    Checklist:
      type: object
      properties:
        status:
          type: string
          example: NEW
        data:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              newValue: {}
              oldValue: {}
              isAccepted:
                type: boolean
              dtUpdated:
                type: string
                nullable: true
      description: Лог изменений полей (используется при модерации).
    Track:
      type: object
      properties:
        trackId:
          type: integer
          format: int64
          example: 908312
        title:
          type: string
          description: Название трека. Для изменения использовать PUT /releases/{id}/tracks/{trackId}; PUT /releases/{id} не обновляет это поле.
          example: Pentagramma
        trackVersion:
          type: string
          nullable: true
          description: Версия (например, "Slowed"); null для основной.
        genre:
          $ref: '#/components/schemas/Genre'
        additionalGenres:
          type: array
          items:
            $ref: '#/components/schemas/Genre'
          description: Дополнительные жанры. Если выбран поджанр, элемент передаётся как { genreId, subGenreId }.
        language:
          type: integer
          description: ID языка из /releases/filters.
          example: 7
        ownIsrc:
          type: string
          nullable: true
        related:
          type: integer
          description: Доля связанных прав (0–100).
          example: 100
        copyrights:
          type: integer
          description: Доля авторских прав (0–100).
          example: 100
        adult:
          type: boolean
          example: false
        instrumental:
          type: boolean
          description: Если true — LYRICIST не обязателен.
          example: false
        karaoke:
          type: string
          nullable: true
        text:
          type: string
          nullable: true
          description: Текст/лирика трека.
        recordingYear:
          type: integer
          example: 2026
        startPoint:
          type: integer
          description: Точка старта превью (сек).
          example: 0
        clipPreviewFrame:
          type: integer
          nullable: true
          description: Только для CLIP.
        artists:
          type: array
          description: >
            Артисты трека. Допустим ровно один MAIN. Дополнительные основные артисты передаются
            как ADVANCED; порядок ADVANCED задаёт порядок артистов через запятую после MAIN.
            Артисты при участии передаются как FEAT; порядок FEAT задаёт порядок отображения
            внутри блока feat.
          items:
            $ref: '#/components/schemas/ArtistRef'
        persons:
          type: array
          items:
            $ref: '#/components/schemas/TrackPerson'
        contributors:
          type: array
          items:
            $ref: '#/components/schemas/Contributor'
      required:
      - trackId
      - title
      - genre
      - language
      - recordingYear
      - persons
      description: Объект трека (тело PUT /releases/{id}/tracks/{trackId} и элемент tracks[]).
    ReleaseUpdate:
      type: object
      properties:
        releaseId:
          type: integer
          format: int64
          example: 362233
        title:
          type: string
          description: Название релиза. PUT /releases/{id} изменяет только название релиза и не изменяет title треков.
          example: Pentagramma
        releaseType:
          type: string
          enum:
          - SINGLE
          - ALBUM
          - EP
          - PODCAST
          - CLIP
          - RINGTONE
          - TIKTOK_SOUND
          example: ALBUM
        status:
          type: string
          enum:
          - DRAFT
          - ALL
          - ERROR
          - MODERATE
          - WAITING
          - SHIPPING
          - RELEASED
          - TASK
          - WORKING
          - UPLOADED
          - REMOVED
          - DELETED
          - EDIT
          - PARTIAL_UPLOAD
          description: При создании/обновлении используется DRAFT; прочие значения выставляются системой.
          example: DRAFT
        releaseDate:
          type: string
          format: date
          description: Дата релиза (на запись — date).
          example: '2026-08-07'
        originalReleaseDate:
          type: string
          format: date
          nullable: true
          description: Оригинальная дата релиза. Для очистки можно передать null.
        presaveDate:
          type: string
          format: date
          nullable: true
        createDate:
          type: string
          format: date-time
          nullable: true
        language:
          type: integer
          nullable: true
          description: ID языка релиза (часто null; язык задаётся на треке).
        genre:
          $ref: '#/components/schemas/Genre'
        additionalGenres:
          type: array
          items:
            $ref: '#/components/schemas/Genre'
          description: Дополнительные жанры. Если выбран поджанр, элемент передаётся как { genreId, subGenreId }.
        label:
          type: string
          description: Название выбранного лейбла в ответе GET. При сохранении выбранный лейбл задаётся через labelId.
          example: AURA MUSIC
        labelId:
          type: integer
          description: ID лейбла из /labels. Принимается в PUT /releases/{id} и возвращается в GET /releases/{id}.
          example: 41510
        articleLabel:
          type: string
          example: MUA362233
        internalId:
          type: string
          example: alligator-r2362233
        releaseVersion:
          type: string
          nullable: true
        ownEan:
          type: string
          nullable: true
        clineValue:
          type: string
          description: Правообладатель (C-line).
          example: AURAMUSIC
        clineYear:
          type: string
          example: '2026'
        plineValue:
          type: string
          description: Правообладатель фонограммы (P-line).
          example: AURAMUSIC
        plineYear:
          type: string
          example: '2026'
        cover:
          type: string
          description: Путь к обложке в хранилище.
        client:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ClientRef'
        artist:
          type: integer
          description: ID единственного MAIN-артиста. Второй и последующие основные артисты передаются в advArtists.
          example: 88029
        advArtists:
          type: array
          items:
            type: integer
          description: ID дополнительных основных артистов. Порядок массива задаёт порядок отображения через запятую после MAIN.
          example:
          - 132050
          - 132934
        featArtists:
          type: array
          items:
            type: integer
          description: ID артистов при участии. Порядок массива задаёт порядок отображения в блоке feat.
          example:
          - 130041
        artists:
          type: array
          minItems: 1
          description: >
            Артисты релиза с ролями. Массив должен быть согласован с artist, advArtists и
            featArtists: один элемент MAIN соответствует artist, элементы ADVANCED соответствуют
            advArtists, элементы FEAT соответствуют featArtists. Порядок передачи: ADVANCED
            в порядке advArtists, затем FEAT в порядке featArtists, затем MAIN.
          items:
            $ref: '#/components/schemas/ArtistRef'
        persons:
          type: array
          items: {}
          description: На уровне релиза всегда пусто. Участники задаются на треках.
        streamingPlatforms:
          type: array
          items:
            type: integer
          description: >
            ID площадок. Подтверждено по бандлу фронтенда и живому API: экран площадок релиза строится
            по GET /platform/platforms/streaming?withProvidersOnly=true — площадки без провайдера
            доставки backend отклоняет (RELEASE_INCORRECT_STREAMING_PLATFORMS на весь список).
            Дальше фронт фильтрует по releaseTypes (видео-площадки только для CLIP), по языкам треков
            (Juno Records 233 и Nightlife Music 254 — только язык 7/EN; Beatport-семейство 213, 272,
            284, 288 не принимает языки 3, 10, 12, 30, 33, 34, 37, 57, 59, 63, 64) и по жанрам
            (Beatport-семейство — только категории Dance / Electronic и Bass Music на релизе и треках;
            Music Worx 246 — Dance / Electronic, Hip-Hop / R&B, Reggae/Dub, Latin; fingerprint-площадки
            199, 219, 615 недоступны для genreId 183 и 192). UGC/fingerprint-площадки
            (199, 220, 264, 269, 280, 615 — константа M9 фронта) — отдельная секция с собственным
            «Select all»: кнопка «выбрать все» их НЕ включает; на Start/Standard-планах они недоступны
            (TikTok доступен для TIKTOK_SOUND). START_V2 ограничен площадками 193, 195, 196, 197, 689.
            При выборе отдельных стран исключаются 218, 224, 229, 234, 252, 266, 289. Связанные пары
            синхронизируются по ID: 282/290 (Apple Music/Shazam), 196/689 (Yandex/KION),
            615/220 (Facebook/Instagram); YouTube Content ID 199 требует YouTube Music 200.
        countries:
          type: array
          items:
            type: integer
          description: Пустой массив означает все страны.
        level:
          type: string
          enum:
          - REGULAR
          - PREMIUM
          example: PREMIUM
        levelPlan:
          type: string
          enum:
          - BUSINESS
          - STANDARD
          - PREMIUM
          - BUSINESS-START
          - BUSINESS-STANDARD
          - BUSINESS-PREMIUM
          example: BUSINESS-PREMIUM
        isReleased:
          type: boolean
          example: false
        contractSigned:
          oneOf:
          - type: boolean
          - type: integer
          example: 0
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/Track'
          description: Массив треков в ответе. PUT /releases/{id} не применяет изменения полей треков из этого массива; для изменения трека использовать PUT /releases/{id}/tracks/{trackId}.
      required:
      - releaseId
      - title
      - releaseType
      - releaseDate
      - genre
      - artists
      description: >
        Тело PUT /releases/{id}. Для SINGLE с одним треком поля artists, title, artist,
        trackVersion, advArtists, featArtists, genres, additionalGenres и genre у релиза и трека
        должны совпадать. PUT /releases/{id} не синхронизирует release.title с tracks[0].title:
        пустой или непустой title трека не меняется при изменении title релиза, а явно переданный
        tracks[0].title в этом payload не применяется. Поле _single в ответе GET не возвращается.
    TrackResponse:
      description: 'Объект трека в ответе: Track плюс серверные поля.'
      allOf:
      - $ref: '#/components/schemas/Track'
      - type: object
        properties:
          media:
            type: array
