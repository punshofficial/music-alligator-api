openapi: 3.0.3
info:
  title: MusicAlligator API
  version: 0.1.0
  description: Спецификация MusicAlligator API. Реконструирована по наблюдаемым запросам и ответам; неподтверждённые
    места помечены в описаниях.
servers:
- url: https://v2api.musicalligator.ru/api
  description: Production
security:
- tokenAuth: []
tags:
- name: Auth
  description: Аутентификация
- name: Releases
  description: Релизы и треки
- name: Media
  description: Универсальная загрузка медиа
- name: Platforms
  description: Площадки и страны
- name: Artists
  description: Артисты
- name: Persons
  description: Участники (авторы, продюсеры и т.п.)
- name: Labels
  description: Лейблы
- name: Bandlinks
  description: Бандлинки (мульти-ссылки)
- name: Statistics
  description: Статистика прослушиваний
- name: Finance
  description: Финансы и выплаты
- name: Client
  description: Клиент, профиль и документы
- name: Packages
  description: Продвижение и пакеты
- name: Support
  description: Поддержка
- name: System
  description: Системные эндпоинты
paths:
  /auth/sign_in:
    post:
      tags:
      - Auth
      summary: Вход
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
              - email
              - password
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /auth/sign_up:
    post:
      tags:
      - Auth
      summary: Регистрация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
              - email
              - password
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /auth/send_confirm_code:
    post:
      tags:
      - Auth
      summary: Отправить код подтверждения
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
              required:
              - email
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /auth/confirm_code:
    post:
      tags:
      - Auth
      summary: Подтвердить код
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                code:
                  type: string
              required:
              - email
              - code
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /auth/change_password:
    post:
      tags:
      - Auth
      summary: Сменить пароль
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
              required:
              - oldPassword
              - newPassword
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /auth/update_password:
    post:
      tags:
      - Auth
      summary: Обновить пароль по токену
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                password:
                  type: string
              required:
              - token
              - password
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /auth/authenticate:
    get:
      tags:
      - Auth
      summary: Проверить токен
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /releases:
    post:
      tags:
      - Releases
      summary: Список релизов
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                search:
                  type: string
                status:
                  type: string
                  enum:
                  - DRAFT
                  - ALL
                  - ERROR
                  - MODERATE
                  - WAITING
                  - SHIPPING
                  - RELEASED
                  - TASK
                  - WORKING
                  - UPLOADED
                  - REMOVED
                  - DELETED
                  - EDIT
                  - PARTIAL_UPLOAD
                limit:
                  type: integer
                skip:
                  type: integer
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /releases/create:
    post:
      tags:
      - Releases
      summary: Создать релиз
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReleaseRequest'
      responses:
        '201':
          description: Релиз создан.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReleaseResponse'
  /releases/filters:
    get:
      tags:
      - Releases
      summary: Справочник фильтров релизов (жанры, типы, языки)
      responses:
        '200':
          description: Справочник.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleasesFiltersResponse'
  /releases/update/track:
    get:
      tags:
      - Releases
      summary: Обновление трека (служебный)
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /releases/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID релиза (возвращается в POST /releases/create).
    get:
      tags:
      - Releases
      summary: Получить релиз по ID
      description: Возвращает релиз целиком, вместе с массивом треков.
      responses:
        '200':
          description: Объект релиза.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseResponse'
        '404':
          description: Релиз не найден.
    put:
      tags:
      - Releases
      summary: Обновить релиз (вместе со всеми треками)
      description: Полное обновление релиза. Тело содержит весь релиз целиком, включая массив tracks[]
        с полными объектами треков.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseUpdate'
      responses:
        '200':
          description: Релиз обновлён.
        '400':
          description: Ошибка валидации.
    delete:
      tags:
      - Releases
      summary: Удалить релиз
      responses:
        '200':
          description: Релиз удалён.
  /releases/{id}/status/moderate:
    put:
      tags:
      - Releases
      summary: Отправить релиз на модерацию
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID релиза.
      responses:
        '200':
          description: Релиз отправлен на модерацию.
  /releases/{id}/cover:
    post:
      tags:
      - Releases
      summary: Загрузить обложку релиза
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID релиза.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Файл обложки.
      responses:
        '200':
          description: Обложка загружена.
  /releases/{id}/tracks/order:
    post:
      tags:
      - Releases
      summary: Изменить порядок треков
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID релиза.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order:
                  type: array
                  items:
                    type: integer
              required:
              - order
              description: Массив trackId в нужном порядке.
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /releases/{id}/tracks/{trackId}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID релиза.
    - name: trackId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID трека.
    put:
      tags:
      - Releases
      summary: Создать/обновить трек
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Track'
      responses:
        '200':
          description: Трек сохранён.
    delete:
      tags:
      - Releases
      summary: Удалить трек
      responses:
        '200':
          description: Трек удалён.
  /releases/{id}/tracks/{trackId}/upload:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID релиза.
    - name: trackId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID трека.
    post:
      tags:
      - Releases
      summary: Загрузить аудиофайл трека
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio:
                  type: string
                  format: binary
                  description: Аудио/видео файл трека.
      responses:
        '200':
          description: Файл загружен.
    delete:
      tags:
      - Releases
      summary: Удалить аудиофайл трека
      responses:
        '200':
          description: Файл удалён.
  /media/upload:
    post:
      tags:
      - Media
      summary: Универсальная загрузка медиа
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Медиафайл.
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /platform/platforms/streaming:
    get:
      tags:
      - Platforms
      summary: Список стриминговых площадок
      parameters:
      - name: withProviders
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Площадки.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamingPlatformsResponse'
  /platform/platforms/social:
    get:
      tags:
      - Platforms
      summary: Список соцсетей
      responses:
        '200':
          description: Соцсети.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialPlatformsResponse'
  /platform/countries:
    get:
      tags:
      - Platforms
      summary: Список стран
      responses:
        '200':
          description: Страны.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountriesResponse'
  /artists:
    get:
      tags:
      - Artists
      summary: Поиск артистов
      parameters:
      - name: name
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      - name: skip
        in: query
        required: false
        schema:
          type: integer
      - name: ids
        in: query
        required: false
        schema:
          type: string
        description: Список ID через запятую.
      responses:
        '200':
          description: Артисты.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NamedRef'
                  statusCode:
                    type: integer
                    example: 200
    post:
      tags:
      - Artists
      summary: Создать артиста
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                platforms:
                  type: array
                  items:
                    type: object
              required:
              - name
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /artists/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID артиста.
    put:
      tags:
      - Artists
      summary: Обновить артиста
      requestBody:
        description: Тело запроса не подтверждено.
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Форма ответа не подтверждена.
    delete:
      tags:
      - Artists
      summary: Удалить артиста
      responses:
        '200':
          description: Артист удалён.
  /persons:
    get:
      tags:
      - Persons
      summary: Поиск участников
      parameters:
      - name: name
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      - name: skip
        in: query
        required: false
        schema:
          type: integer
      - name: ids
        in: query
        required: false
        schema:
          type: string
        description: Список ID через запятую.
      responses:
        '200':
          description: Участники.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NamedRef'
                  statusCode:
                    type: integer
                    example: 200
    post:
      tags:
      - Persons
      summary: Создать участника
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonCreate'
      responses:
        '201':
          description: Участник создан.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
  /persons/person-data:
    get:
      tags:
      - Persons
      summary: Справочник ролей и инструментов
      description: Источник правды по ролям (roleKeys) и инструментам (instrumentKeys) для треков.
      responses:
        '200':
          description: Справочник.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonDataResponse'
  /persons/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID участника.
    put:
      tags:
      - Persons
      summary: Обновить участника
      requestBody:
        description: Тело запроса не подтверждено.
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Форма ответа не подтверждена.
    delete:
      tags:
      - Persons
      summary: Удалить участника
      responses:
        '200':
          description: Участник удалён.
  /labels:
    get:
      tags:
      - Labels
      summary: Поиск лейблов
      parameters:
      - name: name
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
      - name: skip
        in: query
        required: false
        schema:
          type: integer
      - name: ids
        in: query
        required: false
        schema:
          type: string
        description: Список ID через запятую.
      responses:
        '200':
          description: Лейблы (ответ с двойной вложенностью data.data).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/NamedRef'
                  statusCode:
                    type: integer
    post:
      tags:
      - Labels
      summary: Создать лейбл
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
              - name
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /labels/{id}:
    put:
      tags:
      - Labels
      summary: Обновить лейбл
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID лейбла.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
              - name
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /multi_links:
    post:
      tags:
      - Bandlinks
      summary: Список или создание бандлинка
      description: Список (search/limit/skip) либо создание (name/...). Конкретное тело зависит от сценария
        и не полностью подтверждено.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                search:
                  type: string
                limit:
                  type: integer
                skip:
                  type: integer
                name:
                  type: string
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /multi_links/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID бандлинка.
    put:
      tags:
      - Bandlinks
      summary: Обновить бандлинк
      requestBody:
        description: Тело запроса не подтверждено.
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Форма ответа не подтверждена.
    delete:
      tags:
      - Bandlinks
      summary: Удалить бандлинк
      responses:
        '200':
          description: Бандлинк удалён.
  /multi_links/name_exists:
    post:
      tags:
      - Bandlinks
      summary: Проверить занятость имени
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
              - name
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /releases/{releaseId}/multi_links/{linkId}:
    delete:
      tags:
      - Bandlinks
      summary: Открепить бандлинк от релиза
      parameters:
      - name: releaseId
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID релиза.
      - name: linkId
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: ID бандлинка.
      responses:
        '200':
          description: Бандлинк откреплён.
  /statistics:
    post:
      tags:
      - Statistics
      summary: Запрос статистики
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatisticsRequest'
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /statistics/filters:
    get:
      tags:
      - Statistics
      summary: Доступные фильтры статистики
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /finance/reports:
    post:
      tags:
      - Finance
      summary: Финансовые отчёты
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                skip:
                  type: integer
                platformIds:
                  type: array
                  items:
                    type: integer
                countryIds:
                  type: array
                  items:
                    type: integer
                artistIds:
                  type: array
                  items:
                    type: integer
                periodIds:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /finance/reports/detailed:
    post:
      tags:
      - Finance
      summary: Детальный отчёт
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                skip:
                  type: integer
                releaseId:
                  type: integer
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /finance/reports/file/{type}:
    get:
      tags:
      - Finance
      summary: Файл отчёта
      parameters:
      - name: type
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /finance/reports/filters:
    get:
      tags:
      - Finance
      summary: Фильтры отчётов
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /finance/transactions:
    post:
      tags:
      - Finance
      summary: Список транзакций
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                skip:
                  type: integer
                type:
                  type: string
                offset:
                  type: integer
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /finance/transactions/create:
    post:
      tags:
      - Finance
      summary: Создать вывод средств
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currency:
                  type: string
                amount:
                  type: number
                createRequziteInput:
                  type: object
              required:
              - currency
              - amount
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /finance/transactions/invoice/{currency}/history:
    get:
      tags:
      - Finance
      summary: История инвойсов
      parameters:
      - name: currency
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Форма ответа не подтверждена.
  /finance/balance:
    get:
      tags:
      - Finance
      summary: Баланс
